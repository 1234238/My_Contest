DIN_taac:
    model_root: './checkpoints/'
    num_workers: 0
    verbose: 1
    early_stop_patience: 2
    pickle_feature_encoder: True
    save_best_only: True
    eval_steps: null
    debug_mode: False
    group_id: null
    use_features: null
    feature_config: null
    model: DIN
    dataset_id: taac2026_tiny
    loss: 'binary_crossentropy'
    metrics: ['logloss', 'AUC']
    task: binary_classification
    optimizer: adam
    learning_rate: 1.0e-3
    embedding_regularizer: 1.0e-5
    net_regularizer: 0
    batch_size: 64
    embedding_dim: 8
    dnn_hidden_units: [256, 128, 64]
    dnn_activations: relu
    attention_hidden_units: [64]
    attention_hidden_activations: "Dice"
    attention_output_activation: null
    attention_dropout: 0
    din_use_softmax: False
    net_dropout: 0.1
    batch_norm: False
    epochs: 5
    shuffle: True
    seed: 2024
    monitor: 'AUC'
    monitor_mode: 'max'

    # 先只用一组 pair
    din_target_field: [if_6]
    din_sequence_field: [iseq_30]

    feature_specs:
        - {name: iseq_30, feature_encoder: null}