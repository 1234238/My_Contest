DIN_taac2026:
    model: DIN
    dataset_id: taac2026
    loss: 'binary_crossentropy'
    metrics: ['logloss', 'AUC']
    task: binary_classification
    optimizer: adam
    learning_rate: 1.0e-3
    embedding_regularizer: 1.e-5
    net_regularizer: 0
    batch_size: 32
    embedding_dim: 16
    dnn_hidden_units: [256, 128]
    dnn_activations: relu
    attention_hidden_units: [64]
    attention_hidden_activations: "Dice"
    attention_output_activation: null
    attention_dropout: 0
    # ====== 核心：target 和 sequence 必须一一配对 ======
    # din_target_field: [item_id, item_int_feats_5, item_int_feats_6]
    # din_sequence_field: [domain_c_seq_47, domain_c_seq_28, domain_c_seq_30]
    din_target_field: []
    din_sequence_field: []
    ## 0.80 0.77 0.789773 0.776515 7717

    din_use_softmax: False
    net_dropout: 0.1
    batch_norm: False
    epochs: 10
    shuffle: True
    seed: 2019
    monitor: {'AUC': 1, 'logloss': -1}
    monitor_mode: 'max'


    # ====== 从 Base 补上的参数 ======
    model_root: './checkpoints/'
    num_workers: 3
    verbose: 1
    early_stop_patience: 2
    pickle_feature_encoder: True
    save_best_only: True
    eval_steps: null
    debug_mode: False
    group_id: null
    use_features: null
    feature_specs: null
    feature_config: null
    gpu: 0